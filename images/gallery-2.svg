<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700">
  <defs>
    <radialGradient id="bgP" cx="35%" cy="20%" r="85%">
      <stop offset="0%" stop-color="#221d12"/>
      <stop offset="60%" stop-color="#131210"/>
      <stop offset="100%" stop-color="#0b0b0c"/>
    </radialGradient>
    <linearGradient id="goldP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0bf4f"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
  </defs>

  <rect width="700" height="700" fill="url(#bgP)"/>

  <!-- shelf uprights -->
  <line x1="60" y1="40" x2="60" y2="660" stroke="url(#goldP)" stroke-width="5"/>
  <line x1="640" y1="40" x2="640" y2="660" stroke="url(#goldP)" stroke-width="5"/>

  <!-- shelves -->
  <g stroke="url(#goldP)" stroke-width="4">
    <line x1="60" y1="140" x2="640" y2="140"/>
    <line x1="60" y1="340" x2="640" y2="340"/>
    <line x1="60" y1="540" x2="640" y2="540"/>
  </g>

  <!-- row 1: headlights -->
  <g transform="translate(0,40)">
    <ellipse cx="150" cy="60" rx="60" ry="42" fill="none" stroke="#e0bf4f" stroke-width="3"/>
    <ellipse cx="150" cy="60" rx="34" ry="22" fill="none" stroke="#f4d876" stroke-width="2"/>
    <circle cx="150" cy="60" r="8" fill="#f4d876" fill-opacity="0.8"/>

    <ellipse cx="330" cy="60" rx="60" ry="42" fill="none" stroke="#e0bf4f" stroke-width="3"/>
    <ellipse cx="330" cy="60" rx="34" ry="22" fill="none" stroke="#f4d876" stroke-width="2"/>
    <circle cx="330" cy="60" r="8" fill="#f4d876" fill-opacity="0.8"/>

    <rect x="440" y="24" width="150" height="72" rx="8" fill="none" stroke="#e0bf4f" stroke-width="3"/>
    <text x="515" y="66" font-family="Arial, sans-serif" font-weight="700" font-size="14" letter-spacing="2" fill="#c9a227" text-anchor="middle">LIGHTS</text>
  </g>

  <!-- row 2: body parts (bonnet + fender) -->
  <g transform="translate(0,150)">
    <path d="M40 90 C 40 60 80 40 160 40 C 260 40 320 60 340 90 L 340 110 L 40 110 Z" fill="none" stroke="#e0bf4f" stroke-width="3"/>
    <path d="M380 60 C 420 40 470 45 500 75 C 520 95 520 130 500 150 L 400 150 L 380 100 Z" fill="none" stroke="#e0bf4f" stroke-width="3"/>
    <rect x="540" y="60" width="90" height="90" rx="10" fill="none" stroke="#e0bf4f" stroke-width="3"/>
    <text x="585" y="112" font-family="Arial, sans-serif" font-weight="700" font-size="13" letter-spacing="1" fill="#c9a227" text-anchor="middle">BODY</text>
  </g>

  <!-- row 3: accessories -->
  <g transform="translate(0,350)">
    <rect x="50" y="40" width="180" height="34" rx="8" fill="none" stroke="#e0bf4f" stroke-width="3"/>
    <rect x="260" y="30" width="120" height="55" rx="10" fill="none" stroke="#e0bf4f" stroke-width="3"/>
    <circle cx="470" cy="55" r="34" fill="none" stroke="#e0bf4f" stroke-width="3"/>
    <circle cx="470" cy="55" r="16" fill="none" stroke="#f4d876" stroke-width="2"/>
    <rect x="540" y="30" width="90" height="55" rx="8" fill="none" stroke="#e0bf4f" stroke-width="3"/>
  </g>

  <!-- crate motif bottom -->
  <g transform="translate(90,570)">
    <rect x="0" y="0" width="130" height="80" rx="4" fill="none" stroke="#c9a227" stroke-width="3"/>
    <line x1="0" y1="26" x2="130" y2="26" stroke="#c9a227" stroke-width="2" stroke-opacity="0.6"/>
    <line x1="65" y1="0" x2="65" y2="80" stroke="#c9a227" stroke-width="2" stroke-opacity="0.6"/>
  </g>
  <g transform="translate(250,565)">
    <rect x="0" y="0" width="150" height="90" rx="4" fill="none" stroke="#c9a227" stroke-width="3"/>
    <line x1="0" y1="30" x2="150" y2="30" stroke="#c9a227" stroke-width="2" stroke-opacity="0.6"/>
    <line x1="75" y1="0" x2="75" y2="90" stroke="#c9a227" stroke-width="2" stroke-opacity="0.6"/>
  </g>
  <g transform="translate(440,570)">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="none" stroke="#c9a227" stroke-width="3"/>
    <line x1="0" y1="26" x2="120" y2="26" stroke="#c9a227" stroke-width="2" stroke-opacity="0.6"/>
    <line x1="60" y1="0" x2="60" y2="80" stroke="#c9a227" stroke-width="2" stroke-opacity="0.6"/>
  </g>
</svg>
